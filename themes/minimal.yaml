ip_adapter_weight: 0.6
controlnet:
  enabled: false
  type: depth
  strength: 0.5
  reference_image: null
upscale_model: "4x-UltraSharp.pth"
negative_prompt: "watermark, text, blurry, low quality, jpeg artifacts, busy, cluttered"
background_post: "dim"
