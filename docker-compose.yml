services:
  document-creation-mcp:
    build: .
    image: document-creation-mcp:latest
    container_name: document-creation-mcp
    ports:
      - "8000:8000"
    environment:
      # Serve over HTTP so Open WebUI can reach it over the network.
      DOC_MCP_TRANSPORT: streamable-http
      DOC_MCP_HOST: 0.0.0.0
      DOC_MCP_PORT: "8000"
      # Where generated decks are written (mounted so you can retrieve them).
      DOC_MCP_OUTPUT_DIR: /app/output
      DOC_MCP_IMAGE_DIR: /app/output/images
      # Return the .pptx as base64 in the tool result so it is downloadable
      # through the chat client without host/volume access.
      DOC_MCP_RETURN_BASE64: "true"
      # Reach your already-running ComfyUI MCP server over the network.
      # Use ".../mcp" for streamable-http or ".../sse" for SSE.
      # Set IMAGE_BACKEND=comfy_api and COMFY_API_URL instead to hit the
      # ComfyUI HTTP API directly.
      IMAGE_BACKEND: "mcp"
      COMFY_MCP_URL: "http://comfyui-mcp:8000/mcp"
      COMFY_MCP_API_KEY: "${COMFY_MCP_API_KEY:-}"
      # COMFY_MCP_TRANSPORT: auto   # auto detects from URL; or set sse / streamable-http
      # COMFY_MCP_TOOL: generate_image
      # --- direct ComfyUI HTTP API (set IMAGE_BACKEND=comfy_api) ---
      # COMFY_API_URL: "http://comfyui:8188"
      # COMFY_API_KEY: "${COMFY_API_KEY:-}"
      # COMFY_API_CHECKPOINT: "sd_xl_base_1.0.safetensors"
      # COMFY_API_STEPS: "25"
      # COMFY_API_CFG: "7.0"
      # COMFY_API_SAMPLER: "euler"
      # COMFY_API_SCHEDULER: "normal"
      # DOC_MCP_DISABLE_IMAGES: "false"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
